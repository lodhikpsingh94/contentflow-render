# ============================================================
#  ContentFlow – Render Blueprint (render.yaml)
#  Deploys all microservices + React frontend on Render.
#
#  Infrastructure (managed, free external services):
#    MongoDB  → MongoDB Atlas  (free M0 cluster, 512MB)
#    Redis    → Upstash Redis  (free tier, 256MB / 500K cmds/mo)
#    Storage  → Cloudflare R2  (free tier, 10GB / no egress fees)
#
#  FREE TIER NOTE:
#    Render gives 750 shared free instance hours/month.
#    Services sleep after 15 min idle (30s cold start).
#    The React webapp is a Static Site — always free, no sleep.
#    For always-on backend, upgrade individual services to Starter ($7/mo).
#
#  SHARED SECRETS (JWT_SECRET, MONGODB_URI, ALLOWED_ORIGINS):
#    Set these once per service below (sync: false = fill in Render dashboard).
#    To share one value across services, create an Environment Group in the
#    Render dashboard (Environment → Environment Groups) and link services there.
# ============================================================

services:

  # ── Demo App / Web SDK Testbed (Static Site) ──────────────────────────────
  # AndroBank demo app that uses the banner-sdk to fetch and display banners.
  # banner-sdk is built first because its dist/ is gitignored and WebAppTest
  # depends on it via "file:../banner-sdk" in package.json.
  - type: web
    name: contentflow-demoapp
    runtime: static
    buildCommand: cd banner-sdk && npm install --legacy-peer-deps && npm run build && cd ../WebAppTest && npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./WebAppTest/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        sync: false

  # ── Frontend (Static Site — truly free, no sleep, no hour cap) ────────────
  - type: web
    name: contentflow-webapp
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    rootDir: WebApp3.1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: VITE_API_BASE_URL
        sync: false

  # ── API Gateway (NestJS orchestration layer) ───────────────────────────────
  - type: web
    name: contentflow-api
    runtime: docker
    dockerfilePath: ./api-service/Dockerfile
    dockerContext: ./api-service
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LOG_LEVEL
        value: info
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CAMPAIGN_SERVICE_URL
        sync: false
      - key: CONTENT_SERVICE_URL
        sync: false
      - key: SEGMENT_SERVICE_URL
        sync: false
      - key: NOTIFICATION_SERVICE_URL
        sync: false
      - key: ANALYTICS_SERVICE_URL
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false

  # ── Campaign Service ───────────────────────────────────────────────────────
  - type: web
    name: contentflow-campaign
    runtime: docker
    dockerfilePath: ./campaign-service/Dockerfile
    dockerContext: ./campaign-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: LOG_LEVEL
        value: info
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false

  # ── Content Service ────────────────────────────────────────────────────────
  - type: web
    name: contentflow-content
    runtime: docker
    dockerfilePath: ./content-Service/Dockerfile
    dockerContext: ./content-Service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: STORAGE_TYPE
        value: s3
      - key: AWS_REGION
        value: auto
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: S3_BUCKET
        value: contentflow-media
      - key: REDIS_URL
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false

  # ── User Segmentation Service ──────────────────────────────────────────────
  - type: web
    name: contentflow-segmentation
    runtime: docker
    dockerfilePath: ./user-segmentation-service/Dockerfile
    dockerContext: ./user-segmentation-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3003
      - key: LOG_LEVEL
        value: info
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false

  # ── Notification Service ───────────────────────────────────────────────────
  - type: web
    name: contentflow-notification
    runtime: docker
    dockerfilePath: ./notification-service/Dockerfile
    dockerContext: ./notification-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3004
      - key: LOG_LEVEL
        value: info
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # ── Analytics Service ──────────────────────────────────────────────────────
  - type: web
    name: contentflow-analytics
    runtime: docker
    dockerfilePath: ./analytics-service/Dockerfile
    dockerContext: ./analytics-service
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3005
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: INTERNAL_SERVICE_TOKEN
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 1000
      - key: CONTENT_SERVICE_URL
        sync: false
