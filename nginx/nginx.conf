worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Upstream services
    upstream api_service {
        server api-service:3000;
    }

    upstream campaign_service {
        server campaign-service:3001;
    }

    upstream content_service {
        server content-service:3002;
    }

    upstream segmentation_service {
        server user-segmentation-service:3003;
    }

    upstream notification_service {
        server notification-service:3004;
    }

    upstream analytics_service {
        server analytics-service:3005;
    }

    upstream webapp {
        server webapp:80;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # File upload size (content service)
        client_max_body_size 50M;

        # ---- API Gateway (NestJS orchestration layer) ----
        location /api/v1/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://api_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }

        # ---- Swagger Docs ----
        location /api/docs {
            proxy_pass http://api_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ---- MinIO Storage Console ----
        location /minio/ {
            proxy_pass http://minio:9001/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ---- Health checks (direct to each service) ----
        location /health/api        { proxy_pass http://api_service/api/v1/health; }
        location /health/campaign   { proxy_pass http://campaign_service/health; }
        location /health/content    { proxy_pass http://content_service/health; }
        location /health/segment    { proxy_pass http://segmentation_service/health; }
        location /health/notify     { proxy_pass http://notification_service/health; }
        location /health/analytics  { proxy_pass http://analytics_service/health; }

        # ---- Frontend (React SPA) ----
        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://webapp;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
